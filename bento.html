<style>
  .bento-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  width: 100%;
}

.bento-item {
  background-color: #1e293b; /* Replace with your colors */
  border-radius: 24px;
  padding: 24px;
}

.col-span-2 { grid-column: span 2; }

.row-span-2 { grid-row: span 2; }
.row-span-3 { grid-row: span 3; }
.row-span-4 { grid-row: span 4; }

/* Mobile Responsiveness */
@media (max-width: 768px) {
  .bento-container {
    grid-template-columns: 1fr;
  }
  .bento-item {
    grid-column: span 1 !important;
    grid-row: span 1 !important;
  }
}
</style>

<div class="bento-container">
  <div class="bento-item col-span-2 row-span-2">
    <!-- Content 1 -->
  </div>
  <div class="bento-item row-span-2">

  </div>
  <div class="bento-item row-span-4">
    <!-- Content 3 -->
  </div>
  <div class="bento-item row-span-3">
    <!-- Content 4 -->
  </div>
  <div class="bento-item col-span-2 row-span-4">
    <!-- Content 5 -->
  </div>
  <div class="bento-item row-span-4">

  <div class="bento-item row-span-4">

</div>
